<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024" />
  <title>Vitesse – Feature Graphic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1024px;
      height: 500px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #06060f;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .canvas {
      width: 1024px;
      height: 500px;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at 18% 50%, #14082e 0%, #06060f 55%);
    }

    /* ── Köşegen renkli bant ── */
    .diagonal-sweep {
      position: absolute;
      inset: 0;
      background: linear-gradient(108deg,
        transparent 42%,
        rgba(105,88,232,0.07) 42%,
        rgba(105,88,232,0.07) 58%,
        transparent 58%);
    }

    /* ── Arka plan SVG: büyük yay ── */
    .bg-arc {
      position: absolute;
      right: -30px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* ── Scatter noktaları ── */
    .dots {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── Glow kaynakları ── */
    .glow {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .glow-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(105,88,232,0.2) 0%, transparent 65%);
      top: -140px; left: -100px;
    }
    .glow-2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(105,88,232,0.16) 0%, transparent 65%);
      bottom: -160px; right: 160px;
    }
    .glow-3 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(245,158,11,0.1) 0%, transparent 65%);
      top: -60px; right: 200px;
    }

    /* ── Sol içerik ── */
    .left {
      position: absolute;
      left: 58px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 400px;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #7c6bff;
      margin-bottom: 14px;
    }

    .brand {
      font-size: 104px;
      font-weight: 900;
      letter-spacing: -7px;
      color: #fff;
      line-height: 0.85;
      margin-bottom: 20px;
    }

    .color-rule {
      width: 220px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #7c6bff 0%, #f59e0b 50%, #10b981 100%);
      margin-bottom: 18px;
    }

    .tagline {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      line-height: 1.65;
      margin-bottom: 26px;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .tag-p { background: rgba(124,107,255,0.18); color: #a89eff; border: 1px solid rgba(124,107,255,0.28); }
    .tag-a { background: rgba(245,158,11,0.14); color: #fcd34d; border: 1px solid rgba(245,158,11,0.24); }
    .tag-g { background: rgba(16,185,129,0.14); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.24); }

    /* ── Sağ: kartlar ── */
    .cards {
      position: absolute;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 292px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .card {
      border-radius: 16px;
      padding: 13px 15px;
      position: relative;
      overflow: hidden;
    }

    /* Araç istatistikleri */
    .card-stats {
      background: rgba(18,14,38,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,107,255,0.15);
      transform: rotate(1.8deg);
    }
    .card-stats::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #7c6bff, #a89eff, transparent);
    }
    .cs-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cs-label {
      font-size: 10px;
      font-weight: 700;
      color: #5a5a8a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .cs-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7c6bff;
      box-shadow: 0 0 6px #7c6bff;
    }
    .cs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px 10px;
    }
    .cs-item { display: flex; flex-direction: column; gap: 2px; }
    .cs-val {
      font-size: 14px;
      font-weight: 800;
      color: #d0c8ff;
      letter-spacing: -0.5px;
    }
    .cs-key {
      font-size: 9px;
      color: #4a4a78;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* Gider kartı */
    .card-expense {
      background: rgba(14,18,32,0.95);
      border: 1px solid rgba(255,255,255,0.085);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(16,185,129,0.12);
      transform: rotate(-1.2deg);
    }
    .card-expense::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #10b981, #34d399, transparent);
    }
    .ce-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .ce-label {
      font-size: 10px;
      font-weight: 700;
      color: #5a5a8a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .ce-total {
      font-size: 11px;
      font-weight: 800;
      color: #6ee7b7;
    }
    .bar-row { display: flex; flex-direction: column; gap: 7px; }
    .bar-item { display: flex; align-items: center; gap: 8px; }
    .bar-lbl { font-size: 10px; color: #7070a8; width: 40px; flex-shrink: 0; font-weight: 600; }
    .bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-val { font-size: 10px; font-weight: 700; color: #b0b0d8; width: 36px; text-align: right; flex-shrink: 0; }

    /* Bakım kartı */
    .card-maint {
      background: rgba(18,14,28,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,158,11,0.12);
      transform: rotate(0.6deg);
    }
    .card-maint::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #f59e0b, #fcd34d, transparent);
    }
    .cm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cm-label {
      font-size: 10px;
      font-weight: 700;
      color: #5a5a8a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .cm-alert {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(245,158,11,0.14);
      border: 1px solid rgba(245,158,11,0.3);
      color: #fcd34d;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .cm-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cm-name {
      font-size: 14px;
      font-weight: 700;
      color: #e8e0ff;
    }
    .cm-km {
      font-size: 14px;
      font-weight: 800;
      color: #fcd34d;
      letter-spacing: -0.5px;
    }

    /* ── Alt şerit ── */
    .bottom-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #7c6bff, #f59e0b, #10b981, #7c6bff);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="canvas">

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="diagonal-sweep"></div>

    <!-- Büyük arka plan yayı -->
    <svg class="bg-arc" width="520" height="520" viewBox="0 0 520 520">
      <circle cx="260" cy="260" r="240" fill="none" stroke="rgba(124,107,255,0.07)" stroke-width="1"/>
      <circle cx="260" cy="260" r="190" fill="none" stroke="rgba(124,107,255,0.05)" stroke-width="1"/>
      <circle cx="260" cy="260" r="140" fill="none" stroke="rgba(124,107,255,0.04)" stroke-width="1"/>
      <path d="M 50 260 A 210 210 0 1 1 470 260" fill="none" stroke="rgba(124,107,255,0.12)" stroke-width="2" stroke-linecap="round"/>
      <path d="M 80 260 A 180 180 0 1 1 440 260" fill="none" stroke="rgba(245,158,11,0.08)" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Yay üzerinde işaretler -->
      <circle cx="50"  cy="260" r="4" fill="rgba(124,107,255,0.5)"/>
      <circle cx="470" cy="260" r="4" fill="rgba(124,107,255,0.5)"/>
      <circle cx="260" cy="22"  r="3" fill="rgba(245,158,11,0.5)"/>
      <!-- Kesik çizgi ızgara -->
      <line x1="260" y1="0" x2="260" y2="520" stroke="rgba(255,255,255,0.025)" stroke-width="1" stroke-dasharray="4 8"/>
      <line x1="0" y1="260" x2="520" y2="260" stroke="rgba(255,255,255,0.025)" stroke-width="1" stroke-dasharray="4 8"/>
    </svg>

    <!-- Scatter noktaları -->
    <svg class="dots" width="1024" height="500">
      <circle cx="480" cy="60"  r="1.5" fill="rgba(124,107,255,0.4)"/>
      <circle cx="530" cy="120" r="1"   fill="rgba(245,158,11,0.35)"/>
      <circle cx="460" cy="200" r="1.5" fill="rgba(16,185,129,0.3)"/>
      <circle cx="510" cy="420" r="1"   fill="rgba(124,107,255,0.3)"/>
      <circle cx="440" cy="360" r="2"   fill="rgba(245,158,11,0.25)"/>
      <circle cx="560" cy="460" r="1.5" fill="rgba(16,185,129,0.3)"/>
      <circle cx="180" cy="40"  r="1"   fill="rgba(124,107,255,0.2)"/>
      <circle cx="100" cy="460" r="1.5" fill="rgba(245,158,11,0.2)"/>
      <circle cx="380" cy="480" r="1"   fill="rgba(16,185,129,0.2)"/>
    </svg>

    <!-- Sol içerik -->
    <div class="left">
      <div class="brand">Vitesse</div>
      <div class="color-rule"></div>
      <div class="tagline">Sade · Akıllı · Eksiksiz</div>
      <div class="tags">
        <div class="tag tag-p">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="10" height="18" rx="1"/><path d="M3 13h10"/><path d="M13 8h2a2 2 0 0 1 2 2v5a2 2 0 0 0 4 0V9a2 2 0 0 0-.59-1.41l-1.66-1.66"/></svg>
          Yakıt Takibi
        </div>
        <div class="tag tag-g">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          Bakım
        </div>
        <div class="tag tag-a">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M15 9c0-1.1-1.3-2-3-2s-3 .9-3 2 1.3 2 3 2 3 .9 3 2-1.3 2-3 2-3-.9-3-2"/><path d="M12 7v10"/></svg>
          Gider Analizi
        </div>
      </div>
    </div>

    <!-- Sağ: kartlar -->
    <div class="cards">

      <div class="card card-stats">
        <div class="cs-head">
          <span class="cs-label">Araç İstatistikleri</span>
          <span class="cs-dot"></span>
        </div>
        <div class="cs-grid">
          <div class="cs-item"><span class="cs-val">85.240 km</span><span class="cs-key">Toplam km</span></div>
          <div class="cs-item"><span class="cs-val">6.4 L/100</span><span class="cs-key">Ort. tüketim</span></div>
          <div class="cs-item"><span class="cs-val">₺24.580</span><span class="cs-key">Bu yıl harcama</span></div>
          <div class="cs-item"><span class="cs-val">42 dolum</span><span class="cs-key">Toplam kayıt</span></div>
        </div>
      </div>

      <div class="card card-expense">
        <div class="ce-head">
          <span class="ce-label">Mayıs Giderleri</span>
          <span class="ce-total">₺13.140</span>
        </div>
        <div class="bar-row">
          <div class="bar-item">
            <span class="bar-lbl">Yakıt</span>
            <div class="bar-track"><div class="bar-fill" style="width:78%;background:linear-gradient(90deg,#7c6bff,#a89eff)"></div></div>
            <span class="bar-val">₺8.240</span>
          </div>
          <div class="bar-item">
            <span class="bar-lbl">Bakım</span>
            <div class="bar-track"><div class="bar-fill" style="width:32%;background:linear-gradient(90deg,#10b981,#34d399)"></div></div>
            <span class="bar-val">₺3.400</span>
          </div>
          <div class="bar-item">
            <span class="bar-lbl">Diğer</span>
            <div class="bar-track"><div class="bar-fill" style="width:14%;background:linear-gradient(90deg,#94a3b8,#cbd5e1)"></div></div>
            <span class="bar-val">₺1.500</span>
          </div>
        </div>
      </div>

      <div class="card card-maint">
        <div class="cm-header">
          <span class="cm-label">Yaklaşan Bakım</span>
          <span class="cm-alert">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
            1.200 km
          </span>
        </div>
        <div class="cm-row">
          <span class="cm-name">Yağ Değişimi</span>
          <span class="cm-km">86.200 km</span>
        </div>
      </div>

    </div>

    <div class="bottom-strip"></div>
  </div>
</body>
</html>
