<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Yakıt Defteri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Geist Mono', 'SF Mono', Monaco, monospace;
  --accent: #f5b342;
  --accent-soft: rgba(245, 179, 66, 0.16);
  --accent-ink: #1a1208;
  --positive: #4ade80;
  --negative: #f87171;

  --bg: #0d0d10;
  --bg-2: #141418;
  --surface: #181820;
  --surface-2: #1e1e28;
  --border: #25252f;
  --border-soft: #1d1d26;
  --text: #f5f5f7;
  --text-2: #8e8e9d;
  --text-dim: #56566a;
  --text-faint: #2d2d3a;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html, body { font-family: var(--font-sans); height: 100%; }
body {
  background: radial-gradient(70% 60% at 50% 20%, #1c1c26 0%, #0c0c10 65%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

/* ── iOS Device Frame ───────────────────────────────────── */
.ios-device {
  width: 400px;
  height: 868px;
  background: #000;
  border-radius: 56px;
  padding: 10px;
  box-shadow:
    0 40px 120px rgba(0, 0, 0, 0.6),
    inset 0 0 0 2px #1a1a1a,
    inset 0 0 0 3px #2a2a2a;
  position: relative;
  flex-shrink: 0;
}
.ios-screen {
  width: 100%;
  height: 100%;
  background: var(--bg);
  border-radius: 46px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}
.ios-statusbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 36px 0;
  color: var(--text);
  z-index: 10;
  pointer-events: none;
}
.ios-statusbar .time {
  font-size: 17px;
  font-weight: 600;
  font-family: var(--font-sans);
  letter-spacing: -0.01em;
}
.ios-statusbar .indicators {
  display: flex;
  align-items: center;
  gap: 6px;
}
.ios-dynamic-island {
  position: absolute;
  top: 11px;
  left: 50%;
  transform: translateX(-50%);
  width: 124px;
  height: 36px;
  background: #000;
  border-radius: 22px;
  z-index: 15;
}
.ios-home-indicator {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  background: var(--text);
  opacity: 0.4;
  border-radius: 100px;
  z-index: 50;
}

/* ── App container ──────────────────────────────────────── */
.app { width: 100%; height: 100%; display: flex; flex-direction: column; color: var(--text); }
.app-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; }
.app-content::-webkit-scrollbar { display: none; }

/* ── Header ─────────────────────────────────────────────── */
.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 60px 18px 6px;
}
.brand-icon {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: var(--accent);
  color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
}
.brand-name {
  font-size: 14px;
}

/* ── Title row ──────────────────────────────────────────── */
.title-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 12px 18px 12px;
  gap: 10px;
}
.title-block h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0;
  line-height: 1;
  color: var(--text);
}
.title-block .sub {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 5px;
  font-weight: 400;
}

/* ── Vehicle Pill ───────────────────────────────────────── */
.vehicle-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 5px 14px 5px 5px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font-sans);
  transition: background 0.15s;
}
.vehicle-pill:hover { background: var(--surface-2); }
.vehicle-pill .dot {
  width: 26px; height: 26px;
  border-radius: 999px;
  background: var(--accent);
  color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
}
.vehicle-pill .plate {
  color: var(--text-2);
  font-weight: 400;
}
.vehicle-pill .chev { color: var(--text-2); margin-left: 2px; }

/* ── Hero Card ──────────────────────────────────────────── */
.hero {
  margin: 0 18px;
  background:
    radial-gradient(90% 80% at 10% 0%, rgba(245, 179, 66, 0.22) 0%, transparent 60%),
    radial-gradient(60% 50% at 90% 100%, rgba(245, 179, 66, 0.08) 0%, transparent 50%),
    var(--surface);
  border: 1px solid rgba(245, 179, 66, 0.2);
  border-radius: 16px;
  padding: 14px 16px 16px;
  box-shadow:
    0 0 0 1px rgba(245, 179, 66, 0.06),
    0 8px 32px rgba(245, 179, 66, 0.08);
}
.hero-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-2);
  font-weight: 400;
  font-family: var(--font-sans);
}
.trend-pill {
  font-size: 12px;
  color: var(--text-2);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.trend-pill .delta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-weight: 500;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}
.trend-pill.down .delta { color: var(--positive); }
.trend-pill.up .delta { color: var(--negative); }

.hero-big-row {
  display: flex;
  align-items: baseline;
  margin-top: 10px;
  gap: 6px;
}
.hero-big {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.035em;
  line-height: 0.95;
  color: var(--text);
}
.hero-unit {
  font-size: 13px;
  color: var(--text-2);
  font-weight: 500;
  font-family: var(--font-mono);
  letter-spacing: -0.005em;
  margin-left: 4px;
}
.hero-sub {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-2);
  font-weight: 400;
}

.tank-row {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tank-row .label {
  font-size: 12px;
  color: var(--text-2);
  text-transform: none;
}
.tank-row .value {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.tank-row .value .num { letter-spacing: -0.01em; }
.tank-row .value .u {
  color: var(--text-2);
  font-weight: 500;
  margin-left: 2px;
}
.tank-row .value .sep {
  color: var(--text-dim);
  margin: 0 4px;
  font-weight: 400;
}

/* ── Stat Grid ──────────────────────────────────────────── */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px 18px 0;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 9px;
  transition: transform 0.15s, background 0.15s;
  cursor: pointer;
}
.stat-card:active {
  transform: scale(0.97);
  background: var(--surface-2);
}
.stat-card .top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
}
.stat-card .top .label {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-2);
  letter-spacing: 0;
  text-transform: none;
}
.stat-card .top .icon { color: var(--text-2); }
.stat-card .value {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1;
  display: inline-flex;
  align-items: baseline;
}
.stat-card .value .u {
  font-size: 10px;
  color: var(--text-2);
  font-weight: 500;
  margin-left: 2px;
  letter-spacing: 0;
}
.stat-card .sub {
  font-size: 10px;
  color: var(--text-2);
  margin-top: 3px;
  font-weight: 400;
}

/* ── Section title ──────────────────────────────────────── */
.section-title {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 14px 18px 8px;
  gap: 12px;
}
.section-title h3 {
  margin: 0;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-2);
  font-family: var(--font-sans);
}
.section-title .meta {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 400;
}

/* ── Chart card ─────────────────────────────────────────── */
.chart-card {
  margin: 0 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 12px 10px;
}

/* ── Upcoming events ────────────────────────────────────── */
.upcoming-list { margin: 0 18px; display: flex; flex-direction: column; gap: 8px; }
.upcoming-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 11px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.upcoming-row .left { display: flex; align-items: center; gap: 10px; }
.upcoming-row .iconbox {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--bg-2);
  color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
}
.upcoming-row .name {
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
}
.upcoming-row .date {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}
.remaining {
  padding: 6px 11px;
  background: var(--bg-2);
  border-radius: 9px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  color: var(--text-2);
}
.remaining.warn {
  background: rgba(248, 113, 113, 0.15);
  color: var(--negative);
}

/* ── Entry list (Geçmiş) ────────────────────────────────── */
.entry-list {
  margin: 0 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.entry {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  gap: 12px;
  padding: 12px 14px;
  align-items: center;
}
.entry + .entry { border-top: 1px solid var(--border); }
.entry { transition: background 0.15s; }
.entry:active { background: var(--surface-2); }
.entry-date {
  text-align: center;
  font-family: var(--font-mono);
  background: var(--bg-2);
  border-radius: 10px;
  padding: 6px 4px;
  width: 40px;
}
.entry-date .day {
  font-size: 17px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--text);
}
.entry-date .mon {
  font-size: 9px;
  text-transform: uppercase;
  color: var(--accent);
  letter-spacing: 0.08em;
  margin-top: 4px;
  font-weight: 600;
}
.entry-mid { min-width: 0; }
.entry-top {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.entry-top .liters {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.015em;
}
.entry-chip {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.entry-chip.full { background: var(--accent-soft); color: var(--accent); }
.entry-chip.partial { background: var(--bg-2); color: var(--text-2); }
.entry-bot {
  margin-top: 3px;
  font-size: 11px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.entry-bot .price {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  color: var(--text-2);
  font-weight: 500;
}
.entry-bot .sep { color: var(--text-dim); }
.entry-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.entry-right .total {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  letter-spacing: -0.01em;
}
.entry-right .total .u {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 500;
  margin-left: 2px;
}
.entry-right .icons { display: flex; gap: 2px; opacity: 0.7; }

/* ── Buttons ────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: none;
  border-radius: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 600;
}
.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
  padding: 14px 22px;
  font-size: 15px;
}
.btn-primary:active { transform: scale(0.98); }
.btn-ghost {
  background: var(--surface);
  color: var(--text);
  padding: 8px 12px;
  border: 1px solid var(--border);
  font-size: 13px;
  font-weight: 500;
}
.btn-ghost:hover { background: var(--surface-2); }
.btn-icon {
  background: transparent;
  border: none;
  color: var(--text-2);
  width: 30px; height: 30px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-icon:hover { background: var(--bg-2); color: var(--text); }

/* ── Bottom Nav ─────────────────────────────────────────── */
.bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 10, 13, 0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  height: 76px;
  padding-bottom: 18px;
  z-index: 40;
}
.nav-btn {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 400;
  font-family: var(--font-sans);
}
.nav-btn.active { color: var(--accent); }
.nav-btn.active svg {
  filter: drop-shadow(0 0 6px rgba(245, 179, 66, 0.5));
}
.nav-btn { position: relative; }
.nav-btn:active { opacity: 0.6; }
.fab-wrap {
  position: relative;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fab {
  width: 56px; height: 56px;
  border-radius: 18px;
  background: var(--accent);
  color: var(--accent-ink);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 28px rgba(245, 179, 66, 0.45);
  position: absolute;
  bottom: -13px;
  z-index: 45;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.95); }

/* ── Modal ──────────────────────────────────────────────── */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  border-radius: 46px;
}
.modal {
  background: var(--bg-2);
  border-top-left-radius: 28px;
  border-top-right-radius: 28px;
  border-bottom-left-radius: 46px;
  border-bottom-right-radius: 46px;
  padding: 18px 22px 24px;
  width: 100%;
  max-height: 90%;
  overflow-y: auto;
}
.modal::-webkit-scrollbar { display: none; }
.modal-handle {
  width: 38px; height: 4px;
  background: var(--text-dim);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.modal-head h2 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--text);
}
.modal-sub {
  font-size: 12.5px;
  color: var(--text-2);
  margin-bottom: 20px;
}

.label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.input, .select, textarea.input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 12px;
  padding: 13px 14px;
  font-family: var(--font-sans);
  font-size: 15px;
  outline: none;
  transition: border 0.15s;
}
.input.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.input:focus, .select:focus, textarea.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text-dim); }
.input[type="date"]::-webkit-calendar-picker-indicator {
  filter: brightness(2) invert(0.8);
  cursor: pointer;
}

.chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
.chip-btn {
  padding: 9px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-sans);
}
.chip-btn.active { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); font-weight: 600; }

.toggle-card {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.toggle-card.on { background: var(--accent-soft); border-color: var(--accent); }
.toggle-card .checkbox {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  color: transparent;
  flex-shrink: 0;
}
.toggle-card.on .checkbox {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-ink);
}
.toggle-card h5 { margin: 0; font-size: 14px; font-weight: 500; color: var(--text); }
.toggle-card p { margin: 3px 0 0; font-size: 12px; color: var(--text-2); line-height: 1.4; }

/* ── Settings row list ─────────────────────────────────── */
.row-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin: 0 18px;
  overflow: hidden;
}
.row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
}

/* ── Count-up animasyonu ────────────────────────────────── */
function useCountUp(target, duration = 600) {
  const [value, setValue] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    if (target === null || isNaN(target)) { setValue(target); return; }
    const from = prev.current;
    prev.current = target;
    if (from === target) return;
    const start = performance.now();
    let raf;
    const tick = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      setValue(from + (target - from) * ease);
      if (t < 1) raf = requestAnimationFrame(tick);
      else setValue(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return value;
}

/* ── Format helpers ────────────────────────────────────── */
const fmt = (n, d = 2) => {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  return Number(n).toLocaleString('tr-TR', { minimumFractionDigits: d, maximumFractionDigits: d });
};
const fmtInt = (n) => {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';

};
const uid = () => Math.random().toString(36).slice(2, 10);
const parseISO = (s) => {if (!s) return null;const [y, m, d] = s.split('-').map(Number);return new Date(y, m - 1, d);};
const fmtDate = (s) => {const d = parseISO(s);if (!d) return '';return `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}.${d.getFullYear()}`;};
const TR_MONTHS = ['Oca', 'Şub', 'Mar', 'Nis', 'May', 'Haz', 'Tem', 'Ağu', 'Eyl', 'Eki', 'Kas', 'Ara'];
const dayMon = (s) => {const d = parseISO(s);if (!d) return { d: '--', m: '---' };return { d: String(d.getDate()).padStart(2, '0'), m: TR_MONTHS[d.getMonth()] };};
const todayISO = () => {const d = new Date();return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;};
const daysUntil = (iso) => {const b = parseISO(iso);if (!b) return 0;return Math.round((b - new Date()) / 86400000);};
const parseNum = (s) => {
  if (typeof s !== 'string') return Number(s) || 0;
  return parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
};

/* ── Stats ─────────────────────────────────────────────── */
function consumptionPoints(entries, vehicleId) {
  const xs = entries.filter((e) => e.vehicleId === vehicleId).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
  const points = [];
  let lastFullIdx = -1;
  for (let i = 0; i < xs.length; i++) {
    if (!xs[i].full) continue;
    if (lastFullIdx === -1) {lastFullIdx = i;continue;}
    let liters = 0;
    for (let j = lastFullIdx + 1; j <= i; j++) liters += xs[j].liters;
    const km = xs[i].km - xs[lastFullIdx].km;
    if (km > 0) points.push({ dateISO: xs[i].dateISO, consumption: liters * 100 / km, km, liters });
    lastFullIdx = i;
  }
  return points;
}
function averageConsumption(pts) {
  if (!pts.length) return null;
  const totalKm = pts.reduce((s, p) => s + p.km, 0);
  const totalL = pts.reduce((s, p) => s + p.liters, 0);
  return totalKm > 0 ? totalL * 100 / totalKm : null;
}

/* ── Area Chart ────────────────────────────────────────── */
function AreaChart({ data, labels, unit = '', decimals = 2 }) {
  const [active, setActive] = useState(null);
  if (!data || data.length < 2) return <div style={{ padding: 24, textAlign: 'center', color: 'var(--text-2)', fontSize: 13 }}>Yetersiz veri</div>;
  const W = 320, H = 160;
  const pad = { t: 12, r: 14, b: 8, l: 50 };
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;

  const dataMin = Math.min(...data);
  const dataMax = Math.max(...data);
  const spread = dataMax - dataMin || 1;

  // Nice round grid values: pick 3–4 labels that span actual range
  const step = spread < 2 ? 0.5 : spread < 5 ? 1 : 2;
  const gridMin = Math.floor(dataMin / step) * step;
  const gridMax = Math.ceil(dataMax / step) * step;
  const gridVals = [];
  for (let v = gridMin; v <= gridMax + 0.001; v += step) gridVals.push(parseFloat(v.toFixed(1)));

  const yMin = gridMin - step * 0.3;
  const yMax = gridMax + step * 0.3;
  const range = yMax - yMin;

  const xs = data.map((_, i) => pad.l + (i / (data.length - 1)) * cW);
  const ys = data.map((v) => pad.t + ((yMax - v) / range) * cH);

  const avg = data.reduce((s, v) => s + v, 0) / data.length;
  const avgY = pad.t + ((yMax - avg) / range) * cH;
  const minVal = Math.min(...data), maxVal = Math.max(...data);
  const minIdx = data.indexOf(minVal), maxIdx = data.indexOf(maxVal);

  // Cubic Bezier smooth path (Catmull-Rom → Bezier)
  const smooth = (pts) => {
    if (pts.length < 2) return '';
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i - 1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[i + 2] || p2;
      const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
      const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
      const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
      const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0]},${p2[1]}`;
    }
    return d;
  };

  const pts = xs.map((x, i) => [x, ys[i]]);
  const linePath = smooth(pts);
  const areaPath = `${linePath} L ${xs[xs.length - 1]},${pad.t + cH} L ${xs[0]},${pad.t + cH} Z`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ width: '100%', display: 'block' }} onClick={() => setActive(null)}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.28" />
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
        </linearGradient>
      </defs>
      {gridVals.map((val, i) => {
        const y = pad.t + ((yMax - val) / range) * cH;
        if (y < pad.t - 2 || y > pad.t + cH + 2) return null;
        return (
          <g key={i}>
            <line x1={pad.l} y1={y} x2={W - pad.r} y2={y} stroke="var(--border)" strokeWidth="1" strokeDasharray="3 5" strokeOpacity="0.7" />
            <text x={pad.l - 24} y={y + 3.5} fontSize="9.5" textAnchor="end" fill="#6e6e82" fontFamily="Geist Mono, monospace">
              {val.toFixed(1)}
            </text>
          </g>
        );
      })}
      <path d={areaPath} fill="url(#areaGrad)" className="chart-area" />
      {/* Ortalama çizgisi */}
      <line x1={pad.l} y1={avgY} x2={W - pad.r} y2={avgY} stroke="rgba(255,255,255,0.08)" strokeWidth="1" strokeDasharray="5 4" />
      <rect x={W / 2 - 31} y={avgY - 19} width={62} height={14} rx="7" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)" strokeWidth="0.8" />
      <text x={W / 2} y={avgY - 9} fontSize="10" textAnchor="middle" fill="rgba(255,255,255,0.55)" fontFamily="Geist Mono, monospace">ort: {fmt(avg, 1)}</text>
      <path d={linePath} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" className="chart-line" />
      {xs.map((x, i) => {
        const isActive = active === i;
        const isMin = i === minIdx;
        const isMax = i === maxIdx;
        const dotColor = isMin ? '#5dba7d' : isMax ? '#c45f5f' : isActive ? 'var(--accent)' : 'var(--bg)';
        const strokeColor = isMin ? '#5dba7d' : isMax ? '#c45f5f' : 'var(--accent)';
        return (
          <g key={i} style={{ cursor: 'pointer' }} onClick={(e) => { e.stopPropagation(); setActive(active === i ? null : i); }}>
            <circle cx={x} cy={ys[i]} r={isActive || isMin || isMax ? 5 : 3.5} fill={dotColor} stroke={strokeColor} strokeWidth="2" className="chart-dot" style={{ transition: 'r 0.15s', animationDelay: `${0.2 + i * 0.03}s` }} />
            {isActive && labels && (() => {
              const tooltipW = 90, tooltipH = 38;
              const tx = Math.min(Math.max(x - tooltipW / 2, pad.l), W - pad.r - tooltipW);
              const tyAbove = ys[i] - tooltipH - 10;
              const ty = tyAbove < pad.t ? ys[i] + 10 : tyAbove;
              const d = parseISO(labels[i]);
              const dateStr = d ? `${d.getDate()} ${['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'][d.getMonth()]}` : labels[i];
              return (
                <g>
                  <rect x={tx} y={ty} width={tooltipW} height={tooltipH} rx="8" fill="var(--surface-2)" stroke="var(--accent)" strokeWidth="1" strokeOpacity="0.4" />
                  <text x={tx + tooltipW / 2} y={ty + 13} fontSize="11" fontWeight="500" textAnchor="middle" fill="var(--text-2)" fontFamily="Geist, sans-serif">{dateStr}</text>
                  <text x={tx + tooltipW / 2} y={ty + 28} fontSize="12" fontWeight="600" textAnchor="middle" fill="var(--accent)" fontFamily="Geist Mono, monospace">{fmt(data[i], decimals)} {unit}</text>
                </g>
              );
            })()}
          </g>
        );
      })}
    </svg>
  );
}

/* ── Özet ──────────────────────────────────────────────── */
function OzetScreen() {
  const store = useStore();
  const vehicle = store.vehicles.find((v) => v.id === store.activeVehicleId) || store.vehicles[0];
  const myEntries = store.entries.filter((e) => e.vehicleId === vehicle?.id).sort((a, b) => b.dateISO.localeCompare(a.dateISO));
  const consPts = useMemo(() => vehicle ? consumptionPoints(store.entries, vehicle.id) : [], [store.entries, vehicle]);
  const avgCons = useMemo(() => averageConsumption(consPts), [consPts]);
  const lastCons = consPts.length ? consPts[consPts.length - 1].consumption : null;
  const prevCons = consPts.length >= 2 ? consPts[consPts.length - 2].consumption : null;
  const consDelta = lastCons !== null && prevCons !== null ? lastCons - prevCons : null;

  const last = myEntries[0];
  const now = new Date();
  const thisMonth = store.entries.filter((e) => {
    if (e.vehicleId !== vehicle?.id) return false;
    const d = parseISO(e.dateISO);
    return d && d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
  const thisMonthSpend = thisMonth.reduce((s, e) => s + e.liters * e.pricePerL, 0);
  const consMonthPct = lastCons !== null && prevCons !== null && prevCons > 0 ? (lastCons - prevCons) / prevCons * 100 : null;

  const tlPerKm = useMemo(() => {
    if (!vehicle || consPts.length === 0) return null;
    const xs = store.entries.filter((e) => e.vehicleId === vehicle.id).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
    let lastFull = -1,totalTL = 0,totalKm = 0;
    for (let i = 0; i < xs.length; i++) {
      if (!xs[i].full) continue;
      if (lastFull === -1) {lastFull = i;continue;}
      for (let j = lastFull + 1; j <= i; j++) totalTL += xs[j].liters * xs[j].pricePerL;
      totalKm += xs[i].km - xs[lastFull].km;
      lastFull = i;
    }
    return totalKm > 0 ? totalTL / totalKm : null;
  }, [store.entries, vehicle, consPts]);

  const sortedVehicleEntries = useMemo(() => store.entries.filter((e) => e.vehicleId === vehicle?.id).sort((a, b) => a.dateISO.localeCompare(b.dateISO)), [store.entries, vehicle]);
  const lastPrice = sortedVehicleEntries.length ? sortedVehicleEntries[sortedVehicleEntries.length - 1].pricePerL : null;
  const prevPrice = sortedVehicleEntries.length >= 2 ? sortedVehicleEntries[sortedVehicleEntries.length - 2].pricePerL : null;
  const priceDiff = lastPrice !== null && prevPrice !== null ? lastPrice - prevPrice : null;

  const yearEntries = store.entries.filter((e) => {
    if (e.vehicleId !== vehicle?.id) return false;
    const d = parseISO(e.dateISO);
    return d && d.getFullYear() === now.getFullYear();
  });

  const upcoming = (store.events || []).
  filter((e) => e.vehicleId === vehicle?.id).
  map((e) => ({ ...e, days: daysUntil(e.endISO) })).
  filter((e) => e.days >= 0 && e.days <= 30).
  sort((a, b) => a.days - b.days);

  const yearSpend = yearEntries.reduce((s, e) => s + e.liters * e.pricePerL, 0);
  const animAvgCons = useCountUp(avgCons ?? 0);
  const animMonthSpend = useCountUp(thisMonthSpend);
  const animTlPerKm = useCountUp(tlPerKm ?? 0);
  const animLastSpend = useCountUp(last ? last.liters * last.pricePerL : 0);
  const animYearSpend = useCountUp(yearSpend);

  if (!vehicle) return <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-2)' }}>Önce araç ekleyin</div>;

  return (
    <div>
      <div className="app-header">
        <BrandIcon />
        <div className="brand-name">Yakıt Defteri</div>
      </div>

      <div className="title-row">
        <div className="title-block">
          <h1>Özet</h1>
          <div className="sub">{store.vehicles.length} araç takip ediliyor</div>
        </div>
        <VehiclePill />
      </div>

      <div className="hero">
        <div className="hero-top">
          <span className="eyebrow">Ortalama Tüketim</span>
          {consDelta !== null &&
          <span className={`trend-pill ${consDelta <= 0 ? 'down' : 'up'}`}>
              <span className="delta">
                {consDelta <= 0 ? <Icon.TrendDown /> : <Icon.TrendUp />}
                {consDelta > 0 ? '+' : ''}{fmt(consDelta, 1)}
              </span>
              son aya göre
            </span>
          }
        </div>
        <div className="hero-big-row">
          <span className="hero-big">{avgCons !== null ? fmt(animAvgCons, 1) : '—'}</span>
          <span className="hero-unit">L/100km</span>
        </div>
        <div className="hero-sub">{consPts.length >= 2 ? `Tam depolar arası · son ${consPts.length} dolum` : 'En az 2 tam depo gerekli'}</div>
        {consMonthPct !== null && <div style={{ fontSize: 11, marginTop: 4, color: consMonthPct > 0 ? '#c45f5f' : '#5dba7d', fontWeight: 500 }}>{consMonthPct > 0 ? '▲' : '▼'} Önceki doluma göre %{Math.abs(consMonthPct).toFixed(1)} {consMonthPct > 0 ? 'daha fazla tüketti' : 'daha az tüketti'}</div>}

        <div className="tank-row">
          <span className="label">Son dolumda ödenen · ₺/L</span>
          <span className="value">
            {lastPrice ? <><span className="num">{fmt(lastPrice, 2)}</span><span className="u">₺/L</span></> : <span className="num">—</span>}
            {priceDiff !== null && <span style={{ fontSize: 11, marginLeft: 6, color: priceDiff > 0.01 ? '#c45f5f' : priceDiff < -0.01 ? '#5dba7d' : 'var(--text-2)' }}>{priceDiff > 0.01 ? '▲' : priceDiff < -0.01 ? '▼' : '='} {Math.abs(priceDiff).toFixed(2)}</span>}
          </span>
        </div>
      </div>

      <div className="stat-grid">
        <div className="stat-card">
          <div className="top">
            <span className="label">Bu ay harcama</span>
            <span className="icon"><Icon.Coin /></span>
          </div>
          <div className="value">{fmt(animMonthSpend, 2)}<span className="u">₺</span></div>
          <div className="sub">{thisMonth.length} dolum</div>
        </div>
        <div className="stat-card">
          <div className="top">
            <span className="label">km başına</span>
            <span className="icon"><Icon.Gauge /></span>
          </div>
          <div className="value">{tlPerKm !== null ? fmt(animTlPerKm, 2) : '—'}<span className="u">₺/km</span></div>
          <div className="sub">son 30 gün</div>
        </div>
        <div className="stat-card">
          <div className="top">
            <span className="label">Son dolum</span>
            <span className="icon"><Icon.Receipt /></span>
          </div>
          <div className="value">{last ? fmt(animLastSpend, 2) : '—'}<span className="u">₺</span></div>
          <div className="sub">{last ? `${fmtDate(last.dateISO)} · ${fmt(last.liters, 0)} L` : '—'}</div>
        </div>
        <div className="stat-card">
          <div className="top">
            <span className="label">Toplam tüketim</span>
            <span className="icon"><Icon.Sparkle /></span>
          </div>
          <div className="value">{fmt(animYearSpend, 0)}<span className="u">₺</span></div>
          <div className="sub">bu yıl · {yearEntries.length} dolum</div>
        </div>
      </div>

      {consPts.length >= 2 &&
      <>
          <div className="section-title">
            <h3>Tüketim Trendi</h3>
            <span className="meta">Son {consPts.length} dolum · L/100km</span>
          </div>
          <div className="chart-card">
            <AreaChart data={consPts.map((p) => p.consumption)} labels={consPts.map((p) => p.dateISO)} unit="L/100km" decimals={1} />
          </div>
        </>
      }

      <div className="section-title" style={{ marginTop: consPts.length < 2 ? 8 : 0 }}>
        <h3>Yaklaşan Hatırlatmalar</h3>
        {upcoming.length > 0 && <span className="meta">Sonraki 30 gün</span>}
      </div>
      {upcoming.length === 0 ? (
        <div style={{ margin: '0 18px' }}>
          <EmptyState
            icon={<Icon.Calendar s={28} />}
            title="Yaklaşan hatırlatma yok"
            sub="Takvim sekmesinden muayene, sigorta gibi etkinlikler ekleyebilirsin."
          />
        </div>
      ) : (
        <div className="upcoming-list">
          {upcoming.map((e) =>
          <div className="upcoming-row" key={e.id}>
                <div className="left">
                  <div className="iconbox">{e.type === 'Kasko' || e.type === 'Sigorta' ? <Icon.Shield /> : <Icon.Wrench />}</div>
                  <div>
                    <div className="name">{e.type}</div>
                    <div className="date">{fmtDate(e.endISO)}</div>
                  </div>
                </div>
                <span className={`remaining ${e.days < 15 ? 'warn' : ''}`}>{e.days} gün</span>
              </div>
          )}
        </div>
      )}
    </div>);

}

      <div className="section-title"><h3>Görünüm</h3></div>
      <div style={{ padding: '0 22px' }}>
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16, padding: 14 }}>
          <div className="label">Tema</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            <button className={`chip-btn ${theme === 'dark' ? 'active' : ''}`} onClick={() => setTheme('dark')} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: 12 }}>
              <Icon.Moon /> Koyu
            </button>
            <button className={`chip-btn ${theme === 'light' ? 'active' : ''}`} onClick={() => setTheme('light')} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: 12 }}>
              <Icon.Sun /> Açık
            </button>
          </div>
        </div>
      </div>

      <div className="section-title">
        <h3>Araçlarım</h3>
        <button className="btn-ghost" style={{ padding: '5px 10px', fontSize: 12 }} onClick={onAddVehicle}><Icon.Plus s={12} /> Ekle</button>
      </div>
      <div className="row-list">
        {store.vehicles.map((v) =>
        <div className="row" key={v.id}>
            <div className="icon"><Icon.Car s={16} /></div>
            <div className="meta">
              <h5>{v.name}</h5>
              <p>{v.fuel} · {v.plate} · {v.tank} L</p>
            </div>
            <div style={{ display: 'flex', gap: 2 }}>
              <button className="btn-icon" onClick={() => onEditVehicle(v)}><Icon.Pencil /></button>
              <button className="btn-icon" onClick={() => {
              if (store.vehicles.length <= 1) {alert('En az 1 araç olmalı.');return;}
              if (confirm('Bu araç ve dolum kayıtları silinsin mi?')) store.deleteVehicle(v.id);
            }}><Icon.Trash /></button>
            </div>
          </div>
        )}
      </div>

      <div className="section-title"><h3>Tercihler</h3></div>
      <div className="row-list">
        <div className="row">
          <div className="icon"><Icon.Bell s={16} /></div>
          <div className="meta">
            <h5>Bildirimler</h5>
            <p>Kasko, sigorta, muayene</p>
          </div>
          <div className={`switch ${bildirim ? 'on' : ''}`} onClick={() => setBildirim((v) => !v)} />
        </div>
      </div>

      <div style={{ padding: '22px' }}>
        <button className="btn-ghost" style={{ width: '100%', padding: 12, justifyContent: 'center', color: 'var(--text-2)' }}
        onClick={() => {if (confirm('Tüm veriler sıfırlansın mı?')) store.resetToSeed();}}>
          <Icon.Trash /> Verileri sıfırla
        </button>
      </div>
    </div>);

}

/* ── Sheets ────────────────────────────────────────────── */
function EntrySheet({ open, onClose, editing }) {
  const store = useStore();
  const isEdit = !!editing;
  const [vehicleId, setVehicleId] = useState(store.activeVehicleId);
  const [dateISO, setDateISO] = useState(todayISO());
  const [liters, setLiters] = useState('');
  const [pricePerL, setPricePerL] = useState('');
  const [km, setKm] = useState('');
  const [station, setStation] = useState('');
  const [full, setFull] = useState(true);

  useEffect(() => {
    if (!open) return;
    if (editing) {
      setVehicleId(editing.vehicleId);
      setDateISO(editing.dateISO);
      setLiters(fmt(editing.liters, 2));
      setPricePerL(fmt(editing.pricePerL, 2));
      setKm(String(editing.km || ''));
      setStation(editing.station || '');
      setFull(!!editing.full);
    } else {
      setVehicleId(store.activeVehicleId);
      setDateISO(todayISO());
      setLiters('');setPricePerL('');setKm('');setStation('');setFull(true);
    }
  }, [open, editing, store.activeVehicleId]);

  const total = useMemo(() => parseNum(liters) * parseNum(pricePerL), [liters, pricePerL]);
  if (!open) return null;

  const submit = () => {
    const l = parseNum(liters),p = parseNum(pricePerL);
    const k = parseInt(String(km).replace(/[^0-9]/g, ''), 10) || 0;
    if (!vehicleId || l <= 0 || p <= 0 || k <= 0) {alert('Eksik alan var.');return;}
    const payload = { vehicleId, dateISO, liters: l, pricePerL: p, km: k, station: station.trim(), full };
    if (isEdit) store.updateEntry(editing.id, payload);else
    store.addEntry(payload);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-head">
          <h2>{isEdit ? 'Dolumu düzenle' : 'Yeni Dolum'}</h2>
          <button className="btn-icon" onClick={onClose}><Icon.X /></button>
        </div>
        <div className="modal-sub">{isEdit ? 'Bu kaydı düzenle' : 'Anlık dolumu ekle · ondalık için virgül'}</div>

        <div className="label">Araç</div>
        <select className="select" value={vehicleId} onChange={(e) => setVehicleId(e.target.value)}>
          {store.vehicles.map((v) => <option key={v.id} value={v.id}>{v.name} · {v.plate}</option>)}
        </select>

        <div className="label" style={{ marginTop: 14 }}>Tarih</div>
        <input className="input mono" type="date" value={dateISO} onChange={(e) => setDateISO(e.target.value)} />

        <div className="label" style={{ marginTop: 14 }}>Kilometre</div>
        <input className="input mono" inputMode="numeric" placeholder="örn. 146200" value={km} onChange={(e) => setKm(e.target.value.replace(/[^0-9]/g, ''))} />

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 14 }}>
          <div>
            <div className="label">Litre</div>
            <input className="input mono" inputMode="decimal" placeholder="0,00" value={liters} onChange={(e) => setLiters(e.target.value)} />
          </div>
          <div>
            <div className="label">₺ / Litre</div>
            <input className="input mono" inputMode="decimal" placeholder="0,00" value={pricePerL} onChange={(e) => setPricePerL(e.target.value)} />
          </div>
        </div>

        <div style={{ marginTop: 12, padding: '14px 16px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span className="eyebrow">Toplam</span>
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 22, fontWeight: 700, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.02em' }}>
            {fmt(total, 2)} <span style={{ color: 'var(--text-2)', fontSize: 13, fontWeight: 500 }}>₺</span>
          </span>
        </div>

        <div className={`toggle-card ${full ? 'on' : ''}`} style={{ marginTop: 12 }} onClick={() => setFull((v) => !v)}>
          <div className="checkbox">{full && <Icon.Check s={14} />}</div>
          <div>
            <h5>Tam depo</h5>
            <p>Tüketim hesabı bir sonraki tam depoyla yapılır.</p>
          </div>
        </div>

        <div className="label" style={{ marginTop: 14 }}>İstasyon (Opsiyonel)</div>
        <input className="input" placeholder="Shell, BP, Opet…" value={station} onChange={(e) => setStation(e.target.value)} />

        <button className="btn btn-primary" style={{ width: '100%', marginTop: 18 }} onClick={submit}>{isEdit ? 'Güncelle' : 'Kaydet'}</button>
      </div>
    </div>);

}

function VehicleSheet({ open, onClose, editing }) {
  const store = useStore();
  const isEdit = !!editing;
  const [name, setName] = useState('');
  const [plate, setPlate] = useState('');
  const [fuel, setFuel] = useState('Dizel');
  const [tank, setTank] = useState('45');

  useEffect(() => {
    if (!open) return;
    if (editing) {setName(editing.name || '');setPlate(editing.plate || '');setFuel(editing.fuel || 'Dizel');setTank(String(editing.tank || 45));} else
    {setName('');setPlate('');setFuel('Dizel');setTank('45');}
  }, [open, editing]);

  if (!open) return null;
  const submit = () => {
    if (!name.trim()) {alert('Ad gerekli.');return;}
    const payload = { name: name.trim(), plate: plate.trim(), fuel, tank: parseFloat(tank) || 45 };
    if (isEdit) store.updateVehicle(editing.id, payload);else
    store.addVehicle(payload);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-head"><h2>{isEdit ? 'Aracı düzenle' : 'Yeni araç'}</h2><button className="btn-icon" onClick={onClose}><Icon.X /></button></div>
        <div className="modal-sub">{isEdit ? 'Araç bilgilerini düzenle' : 'Yeni araç ekle'}</div>
        <div className="label">Ad</div>
        <input className="input" placeholder="Polo" value={name} onChange={(e) => setName(e.target.value)} />
        <div className="label" style={{ marginTop: 12 }}>Plaka</div>
        <input className="input" placeholder="34 ABC 123" value={plate} onChange={(e) => setPlate(e.target.value)} />
        <div className="label" style={{ marginTop: 12 }}>Yakıt</div>
        <div className="chip-group">
          {['Dizel', 'Benzin', 'LPG', 'Elektrik', 'Hibrit'].map((f) =>
          <button key={f} className={`chip-btn ${fuel === f ? 'active' : ''}`} onClick={() => setFuel(f)}>{f}</button>
          )}
        </div>
        <div className="label" style={{ marginTop: 12 }}>Depo (L)</div>
        <input className="input mono" inputMode="numeric" value={tank} onChange={(e) => setTank(e.target.value.replace(/[^0-9]/g, ''))} />
        <button className="btn btn-primary" style={{ width: '100%', marginTop: 18 }} onClick={submit}>{isEdit ? 'Güncelle' : 'Kaydet'}</button>
      </div>
    </div>);

}

function EventSheet({ open, onClose, editing }) {
  const store = useStore();
  const isEdit = !!editing;
  const [type, setType] = useState('Kasko');
  const [vehicleId, setVehicleId] = useState(store.activeVehicleId);
  const [startISO, setStartISO] = useState(todayISO());
  const [endISO, setEndISO] = useState('');
  const [notifyDays, setNotifyDays] = useState(15);

  useEffect(() => {
    if (!open) return;
    if (editing) {
      setType(editing.type || 'Kasko');
      setVehicleId(editing.vehicleId);
      setStartISO(editing.startISO || todayISO());
      setEndISO(editing.endISO || '');
      setNotifyDays(editing.notifyDays || 15);
    } else {
      setType('Kasko');
      setVehicleId(store.activeVehicleId);
      setStartISO(todayISO());
      const d = new Date();d.setFullYear(d.getFullYear() + 1);
      setEndISO(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
      setNotifyDays(15);
    }
  }, [open, editing, store.activeVehicleId]);

  if (!open) return null;
  const submit = () => {
    if (!endISO) {alert('Bitiş tarihi gerekli.');return;}
    const payload = { type, vehicleId, startISO, endISO, notifyDays };
    if (isEdit) store.updateEvent(editing.id, payload);else
    store.addEvent(payload);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-head"><h2>{isEdit ? 'Etkinliği düzenle' : 'Yeni etkinlik'}</h2><button className="btn-icon" onClick={onClose}><Icon.X /></button></div>
        <div className="modal-sub">{isEdit ? 'Etkinlik bilgilerini düzenle' : 'Yeni hatırlatma ekle'}</div>
        <div className="label">Tür</div>
        <div className="chip-group">
          {['Kasko', 'Sigorta', 'Muayene', 'Bakım', 'Diğer'].map((t) =>
          <button key={t} className={`chip-btn ${type === t ? 'active' : ''}`} onClick={() => setType(t)}>{t}</button>
          )}
        </div>
        <div className="label" style={{ marginTop: 14 }}>Araç</div>
        <select className="select" value={vehicleId} onChange={(e) => setVehicleId(e.target.value)}>
          {store.vehicles.map((v) => <option key={v.id} value={v.id}>{v.name} · {v.plate}</option>)}
        </select>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 12 }}>
          <div>
            <div className="label">Başlangıç</div>
            <input className="input mono" type="date" value={startISO} onChange={(e) => setStartISO(e.target.value)} />
          </div>
          <div>
            <div className="label">Bitiş</div>
            <input className="input mono" type="date" value={endISO} onChange={(e) => setEndISO(e.target.value)} />
          </div>
        </div>
        <div className="label" style={{ marginTop: 12 }}>Önceden bildir (gün)</div>
        <div className="chip-group">
          {[7, 15, 30, 60].map((d) =>
          <button key={d} className={`chip-btn ${notifyDays === d ? 'active' : ''}`} onClick={() => setNotifyDays(d)}>{d}</button>
          )}
        </div>
        <button className="btn btn-primary" style={{ width: '100%', marginTop: 18 }} onClick={submit}>{isEdit ? 'Güncelle' : 'Kaydet'}</button>
      </div>
    </div>);

}

/* ── Root App ──────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState('ozet');
  const [theme, setTheme] = useState('dark');
  const [entrySheet, setEntrySheet] = useState({ open: false, editing: null });
  const [vehicleSheet, setVehicleSheet] = useState({ open: false, editing: null });
  const [eventSheet, setEventSheet] = useState({ open: false, editing: null });

  return (
    <StoreProvider>
      <div className="ios-device">
        <div className="ios-screen">
          <div className="ios-dynamic-island" />
          <div className="ios-statusbar">
            <span className="time">9:41</span>
            <span className="indicators">
              <SignalIcon />
              <WifiIcon />
              <BatteryIcon />
            </span>
          </div>
          <div className="app">
            <div className="app-content">
              <div key={screen} className="screen-transition">
                {screen === 'ozet' && <OzetScreen />}
                {screen === 'gecmis' && <GecmisScreen onEdit={(e) => setEntrySheet({ open: true, editing: e })} />}
                {screen === 'takvim' && <TakvimScreen onAddEvent={() => setEventSheet({ open: true, editing: null })} onEditEvent={(e) => setEventSheet({ open: true, editing: e })} />}
                {screen === 'ayarlar' && <AyarlarScreen theme={theme} setTheme={setTheme} onAddVehicle={() => setVehicleSheet({ open: true, editing: null })} onEditVehicle={(v) => setVehicleSheet({ open: true, editing: v })} />}
              </div>
            </div>
            <nav className="bottom-nav">
              <button className={`nav-btn ${screen === 'ozet' ? 'active' : ''}`} onClick={() => setScreen('ozet')}><Icon.Home s={22} /><span>Özet</span></button>
              <button className={`nav-btn ${screen === 'gecmis' ? 'active' : ''}`} onClick={() => setScreen('gecmis')}><Icon.History s={22} /><span>Geçmiş</span></button>
              <div className="fab-wrap"><button className="fab" onClick={() => setEntrySheet({ open: true, editing: null })}><Icon.Plus s={26} /></button></div>
              <button className={`nav-btn ${screen === 'takvim' ? 'active' : ''}`} onClick={() => setScreen('takvim')}><Icon.Calendar s={22} /><span>Takvim</span></button>
              <button className={`nav-btn ${screen === 'ayarlar' ? 'active' : ''}`} onClick={() => setScreen('ayarlar')}><Icon.Settings s={22} /><span>Ayarlar</span></button>
            </nav>
            <div className="ios-home-indicator" />
          </div>
          <EntrySheet open={entrySheet.open} editing={entrySheet.editing} onClose={() => setEntrySheet({ open: false, editing: null })} />
          <VehicleSheet open={vehicleSheet.open} editing={vehicleSheet.editing} onClose={() => setVehicleSheet({ open: false, editing: null })} />
          <EventSheet open={eventSheet.open} editing={eventSheet.editing} onClose={() => setEventSheet({ open: false, editing: null })} />
        </div>
      </div>
    </StoreProvider>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
