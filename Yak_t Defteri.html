<title>Yakıt Defteri</title>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
  --accent: oklch(0.80 0.155 78);
  --accent-soft: oklch(0.30 0.08 78);
  --accent-ink: #1a1a1a;
  --positive: #50c878;
  --negative: #ff6b54;
}
[data-theme="light"] {
  --bg: #ffffff;
  --bg-2: #f5f5f7;
  --surface: #fafafa;
  --surface-2: #f0f0f2;
  --border: #e5e5e7;
  --text: #000000;
  --text-2: #555555;
  --text-dim: #888888;
  --text-faint: #cccccc;
  --accent-soft: oklch(0.95 0.04 78);
}
[data-theme="dark"] {
  --bg: #0a0a0d;
  --bg-2: #14141a;
  --surface: #1a1a22;
  --surface-2: #22222c;
  --border: #2a2a35;
  --text: #ffffff;
  --text-2: #a8a8b3;
  --text-dim: #6a6a78;
  --text-faint: #3a3a45;
  --accent-soft: rgba(218, 165, 32, 0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { font-family: var(--font-sans); height: 100%; }
body {
  background: radial-gradient(70% 60% at 50% 25%, #1a1a22 0%, #08080c 65%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

/* iOS Device Frame */
.ios-device {
  width: 400px;
  height: 868px;
  background: #000;
  border-radius: 56px;
  padding: 10px;
  box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5), inset 0 0 0 2px #1a1a1a;
  position: relative;
  flex-shrink: 0;
}
.ios-screen {
  width: 100%;
  height: 100%;
  background: var(--bg);
  border-radius: 46px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}
.ios-statusbar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 36px 0;
  color: var(--text);
  font-size: 16px;
  font-weight: 600;
  z-index: 10;
  pointer-events: none;
}
.ios-statusbar-icons { display: flex; align-items: center; gap: 6px; }
.ios-dynamic-island {
  position: absolute;
  top: 11px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 36px;
  background: #000;
  border-radius: 22px;
  z-index: 15;
}
.ios-home-indicator {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  background: var(--text);
  opacity: 0.4;
  border-radius: 100px;
  z-index: 50;
}

/* App */
.app { width: 100%; height: 100%; display: flex; flex-direction: column; color: var(--text); }
.app-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; }
.app-content::-webkit-scrollbar { display: none; }

/* Header */
.app-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 62px 20px 14px;
}
.brand-icon {
  width: 36px; height: 36px;
  border-radius: 12px;
  background: var(--accent);
  color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
}
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }

/* Title row */
.title-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 20px;
  margin-bottom: 16px;
  gap: 12px;
}
.title-block h1 {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -0.025em;
  margin: 0;
  line-height: 1;
}
.title-block .sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 6px;
}

/* Vehicle Pill */
.vehicle-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 12px 6px 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
}
.vehicle-pill .dot {
  width: 22px; height: 22px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
}

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* Hero */
.hero {
  margin: 0 20px;
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px 20px 20px;
}
.hero-label-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  font-weight: 600;
}
.trend-pill {
  font-size: 11px;
  color: var(--text-dim);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.trend-pill .delta { color: var(--positive); display: inline-flex; align-items: center; gap: 3px; font-weight: 500; }
.hero-big {
  margin-top: 8px;
  font-size: 64px;
  font-weight: 700;
  letter-spacing: -0.04em;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: baseline;
  gap: 8px;
  line-height: 1.05;
}
.hero-big .u {
  font-size: 19px;
  color: var(--text-2);
  font-weight: 500;
  letter-spacing: -0.005em;
}
.hero-sub { font-size: 13px; color: var(--text-dim); margin-top: 6px; }

/* Tank gauge */
.tank-row {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
}
.tank-row .label { color: var(--text-dim); }
.tank-row .value {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 12px;
}
.tank-row .value .pct { color: var(--text-dim); font-weight: 400; }

/* Stat Grid */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px 20px 0;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
}
.stat-card .top {
  display: flex; align-items: center; justify-content: space-between;
}
.stat-card .label { font-size: 13px; font-weight: 500; color: var(--text); }
.stat-card .icon { color: var(--text-dim); width: 16px; height: 16px; }
.stat-card .value {
  margin-top: 8px;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.025em;
  color: var(--text);
  display: flex;
  align-items: baseline;
  gap: 3px;
}
.stat-card .value .u {
  font-size: 13px;
  color: var(--text-2);
  font-weight: 500;
}
.stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

/* Section title */
.section-title {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 24px 20px 10px;
  gap: 12px;
}
.section-title h3 {
  margin: 0;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.section-title .meta { font-size: 11px; color: var(--text-dim); }

/* Chart */
.chart-card {
  margin: 0 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  overflow: hidden;
}

/* Upcoming */
.upcoming-list { margin: 0 20px; }
.upcoming-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.upcoming-row .left { display: flex; align-items: center; gap: 12px; }
.upcoming-row .iconbox {
  width: 36px; height: 36px;
  border-radius: 11px;
  background: var(--bg-2);
  color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
}
.upcoming-row .name { font-size: 14px; font-weight: 500; }
.upcoming-row .date { font-size: 12px; color: var(--text-dim); margin-top: 2px; font-family: var(--font-mono); }
.remaining {
  padding: 5px 10px;
  background: var(--bg-2);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-2);
}
.remaining.warn { background: rgba(255, 107, 84, 0.15); color: var(--negative); }

/* Entry list */
.entry-list { margin: 0 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 0 16px; }
.entry {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 14px;
  padding: 16px 0;
  align-items: center;
}
.entry + .entry { border-top: 1px solid var(--border); }
.entry-date { text-align: center; font-family: var(--font-mono); }
.entry-date .day { font-size: 20px; font-weight: 500; line-height: 1; letter-spacing: -0.02em; }
.entry-date .mon { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.1em; margin-top: 4px; }
.entry-mid { min-width: 0; }
.entry-top { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; }
.entry-top .liters { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.entry-chip {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.entry-chip.full { background: var(--accent-soft); color: var(--accent); }
.entry-chip.partial { background: var(--bg-2); color: var(--text-dim); }
.entry-bot {
  margin-top: 5px;
  font-size: 12.5px;
  color: var(--text-dim);
  display: flex; align-items: center; gap: 7px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.entry-bot .price { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--text-2); font-weight: 500; }
.entry-bot .sep { color: var(--text-faint); }
.entry-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.entry-right .total { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 16px; font-weight: 500; white-space: nowrap; }
.entry-right .icons { display: flex; gap: 2px; opacity: 0.6; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: 12px; font-family: var(--font-sans); cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: var(--accent-ink); padding: 14px 20px; font-size: 15px; font-weight: 600; }
.btn-primary:active { transform: scale(0.98); }
.btn-ghost { background: transparent; color: var(--text); padding: 8px 12px; border: 1px solid var(--border); font-size: 13px; }
.btn-ghost:hover { background: var(--surface); }
.btn-icon {
  background: transparent;
  border: none;
  color: var(--text-2);
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.btn-icon:hover { background: var(--bg-2); color: var(--text); }

/* Bottom Nav */
.bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(20, 20, 26, 0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  height: 72px;
  padding-bottom: 16px;
  z-index: 40;
}
[data-theme="light"] .bottom-nav { background: rgba(255, 255, 255, 0.85); }
.nav-btn {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 500;
}
.nav-btn.active { color: var(--accent); }
.nav-btn:active { opacity: 0.6; }
.fab-wrap { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; }
.fab {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--accent-ink);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(218, 165, 32, 0.4);
  position: absolute;
  bottom: 16px;
  z-index: 45;
}
.fab:active { transform: scale(0.95); }

/* Modal */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  border-radius: 46px;
}
.modal {
  background: var(--bg);
  border-radius: 24px 24px 46px 46px;
  padding: 20px;
  width: 100%;
  max-height: 90%;
  overflow-y: auto;
}
.modal::-webkit-scrollbar { display: none; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.modal-head h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.modal-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 18px; }

.label { display: block; font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.08em; }
.input, .select {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 12px;
  padding: 13px 14px;
  font-family: var(--font-sans);
  font-size: 15px;
  outline: none;
  transition: border 0.15s;
}
.input.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.input:focus, .select:focus { border-color: var(--accent); }
[data-theme="dark"] .input[type="date"]::-webkit-calendar-picker-indicator { filter: brightness(2) invert(0.8); }

.chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
.chip-btn {
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.chip-btn.active { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

.toggle-card {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
}
.toggle-card.on { background: var(--accent-soft); border-color: var(--accent); }
.toggle-card .checkbox {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  color: transparent;
  flex-shrink: 0;
}
.toggle-card.on .checkbox { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.toggle-card h5 { margin: 0; font-size: 14px; font-weight: 500; }
.toggle-card p { margin: 3px 0 0; font-size: 12px; color: var(--text-dim); line-height: 1.4; }

/* Settings */
.row-list { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 0 14px; margin: 0 20px; }
.row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0;
}
.row + .row { border-top: 1px solid var(--border); }
.row .icon { width: 32px; height: 32px; border-radius: 10px; background: var(--bg-2); color: var(--text-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.row .meta { flex: 1; min-width: 0; }
.row .meta h5 { margin: 0; font-size: 14px; font-weight: 500; }
.row .meta p { margin: 2px 0 0; font-size: 12px; color: var(--text-dim); }
.switch { width: 44px; height: 26px; border-radius: 999px; background: var(--border); position: relative; cursor: pointer; transition: background 0.2s; }
.switch::after { content: ''; position: absolute; width: 22px; height: 22px; border-radius: 999px; background: white; top: 2px; left: 2px; transition: left 0.2s; }
.switch.on { background: var(--accent); }
.switch.on::after { left: 20px; }

/* Theme grid */
.theme-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.theme-opt {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--bg-2);
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
}
.theme-opt.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

.swatch-row { display: flex; gap: 10px; }
.swatch {
  width: 36px; height: 36px;
  border-radius: 12px;
  border: 2px solid transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.swatch.active { border-color: var(--text); }
</style>
</head>

/* ── Helpers ─────────────────────────────────────────── */
const fmt = (n, d = 2) => {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  return Number(n).toLocaleString('tr-TR', { minimumFractionDigits: d, maximumFractionDigits: d });
};
const fmtInt = (n) => {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  return Number(n).toLocaleString('tr-TR');
};
const uid = () => Math.random().toString(36).slice(2, 10);
const parseISO = (s) => { if (!s) return null; const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); };
const fmtDate = (s) => { const d = parseISO(s); if (!d) return ''; return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`; };
const TR_MONTHS = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const TR_MONTHS_LONG = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const dayMon = (s) => { const d = parseISO(s); if (!d) return { d: '--', m: '---' }; return { d: String(d.getDate()).padStart(2,'0'), m: TR_MONTHS[d.getMonth()] }; };
const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const daysUntil = (iso) => { const b = parseISO(iso); if (!b) return 0; return Math.round((b - new Date()) / 86400000); };
const parseNum = (s) => {
  if (typeof s !== 'string') return Number(s) || 0;
  return parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
};

function loadStore() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : SEED; }
  catch (e) { return SEED; }
}
function saveStore(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch (e) {} }

const StoreCtx = createContext(null);
function StoreProvider({ children }) {
  const [data, setData] = useState(loadStore);
  useEffect(() => { saveStore(data); }, [data]);
  const actions = useMemo(() => ({
    setActiveVehicleId: (id) => setData(d => ({ ...d, activeVehicleId: id })),
    addEntry: (e) => setData(d => ({ ...d, entries: [...d.entries, { ...e, id: uid() }] })),
    updateEntry: (id, p) => setData(d => ({ ...d, entries: d.entries.map(e => e.id === id ? { ...e, ...p } : e) })),
    deleteEntry: (id) => setData(d => ({ ...d, entries: d.entries.filter(e => e.id !== id) })),
    addVehicle: (v) => setData(d => ({ ...d, vehicles: [...d.vehicles, { ...v, id: uid() }] })),
    updateVehicle: (id, p) => setData(d => ({ ...d, vehicles: d.vehicles.map(v => v.id === id ? { ...v, ...p } : v) })),
    deleteVehicle: (id) => setData(d => ({ ...d, vehicles: d.vehicles.filter(v => v.id !== id), entries: d.entries.filter(e => e.vehicleId !== id) })),
    addEvent: (e) => setData(d => ({ ...d, events: [...d.events, { ...e, id: uid() }] })),
    updateEvent: (id, p) => setData(d => ({ ...d, events: d.events.map(e => e.id === id ? { ...e, ...p } : e) })),
    deleteEvent: (id) => setData(d => ({ ...d, events: d.events.filter(e => e.id !== id) })),
    resetToSeed: () => setData(SEED),
  }), []);
  const value = useMemo(() => ({ ...data, ...actions }), [data, actions]);
  return <StoreCtx.Provider value={value}>{children}</StoreCtx.Provider>;
}
const useStore = () => useContext(StoreCtx);

/* ── Calculations ─────────────────────────────────────── */
function consumptionPoints(entries, vehicleId) {
  const xs = entries.filter(e => e.vehicleId === vehicleId).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
  const points = [];
  let lastFullIdx = -1;
  for (let i = 0; i < xs.length; i++) {
    if (!xs[i].full) continue;
    if (lastFullIdx === -1) { lastFullIdx = i; continue; }
    let liters = 0;
    for (let j = lastFullIdx + 1; j <= i; j++) liters += xs[j].liters;
    const km = xs[i].km - xs[lastFullIdx].km;
    if (km > 0) points.push({ dateISO: xs[i].dateISO, consumption: (liters * 100) / km, km, liters });
    lastFullIdx = i;
  }
  return points;
}
function averageConsumption(pts) {
  if (!pts.length) return null;
  const totalKm = pts.reduce((s, p) => s + p.km, 0);
  const totalL = pts.reduce((s, p) => s + p.liters, 0);
  return totalKm > 0 ? (totalL * 100) / totalKm : null;
}

/* ── Area Chart ───────────────────────────────────────── */
function AreaChart({ data, height = 160 }) {
  if (!data || data.length < 2) return <div style={{ padding: 30, textAlign: 'center', color: 'var(--text-dim)', fontSize: 13 }}>Yetersiz veri</div>;
  const w = 320, pad = { t: 16, r: 16, b: 12, l: 36 };
  const chartW = w - pad.l - pad.r;
  const chartH = height - pad.t - pad.b;
  const min = Math.min(...data) * 0.92;
  const max = Math.max(...data) * 1.08;
  const range = max - min || 1;
  const xs = data.map((_, i) => pad.l + (i / (data.length - 1)) * chartW);
  const ys = data.map(v => pad.t + ((max - v) / range) * chartH);
  const path = `M ${xs.map((x, i) => `${x},${ys[i]}`).join(' L ')} L ${xs[xs.length-1]},${pad.t+chartH} L ${xs[0]},${pad.t+chartH} Z`;
  const labelPositions = [0, 0.5, 1];
  return (
    <svg viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="xMidYMid meet" style={{ width: '100%', display: 'block' }}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.4"/>
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {labelPositions.map((p, i) => {
        const y = pad.t + p * chartH;
        const val = max - p * range;
        return (
          <g key={i}>
            <line x1={pad.l} y1={y} x2={w-pad.r} y2={y} stroke="var(--border)" strokeWidth="1" strokeDasharray="2 4"/>
            <text x={pad.l - 6} y={y + 3} fontSize="10" textAnchor="end" fill="var(--text-dim)" fontFamily="var(--font-mono)">{val.toFixed(1)}</text>
          </g>
        );
      })}
      <path d={path} fill="url(#areaGrad)"/>
      <polyline points={xs.map((x, i) => `${x},${ys[i]}`).join(' ')} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map((x, i) => <circle key={i} cx={x} cy={ys[i]} r="3.5" fill="var(--bg)" stroke="var(--accent)" strokeWidth="2"/>)}
    </svg>
  );
}

/* ── Özet Screen ─────────────────────────────────────── */
function OzetScreen() {
  const store = useStore();
  const vehicle = store.vehicles.find(v => v.id === store.activeVehicleId) || store.vehicles[0];
  const myEntries = store.entries.filter(e => e.vehicleId === vehicle?.id).sort((a, b) => b.dateISO.localeCompare(a.dateISO));
  const consPts = useMemo(() => vehicle ? consumptionPoints(store.entries, vehicle.id) : [], [store.entries, vehicle]);
  const avgCons = useMemo(() => averageConsumption(consPts), [consPts]);
  const lastCons = consPts.length ? consPts[consPts.length-1].consumption : null;
  const prevCons = consPts.length >= 2 ? consPts[consPts.length-2].consumption : null;
  const consDelta = (lastCons !== null && prevCons !== null) ? (lastCons - prevCons) : null;

  const last = myEntries[0];
  const now = new Date();
  const thisMonth = store.entries.filter(e => {
    if (e.vehicleId !== vehicle?.id) return false;
    const d = parseISO(e.dateISO);
    return d && d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
  const thisMonthSpend = thisMonth.reduce((s, e) => s + e.liters * e.pricePerL, 0);

  // ₺/km
  const tlPerKm = useMemo(() => {
    if (!vehicle || consPts.length === 0) return null;
    const xs = store.entries.filter(e => e.vehicleId === vehicle.id).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
    let lastFull = -1, totalTL = 0, totalKm = 0;
    for (let i = 0; i < xs.length; i++) {
      if (!xs[i].full) continue;
      if (lastFull === -1) { lastFull = i; continue; }
      for (let j = lastFull + 1; j <= i; j++) totalTL += xs[j].liters * xs[j].pricePerL;
      totalKm += xs[i].km - xs[lastFull].km;
      lastFull = i;
    }
    return totalKm > 0 ? totalTL / totalKm : null;
  }, [store.entries, vehicle, consPts]);

  // Tank estimate
  const tankPct = useMemo(() => {
    if (!vehicle || avgCons === null) return 50;
    const sorted = store.entries.filter(e => e.vehicleId === vehicle.id).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
    const lastFull = [...sorted].reverse().find(e => e.full);
    if (!lastFull) return 50;
    const newest = sorted[sorted.length - 1];
    const kmDriven = newest.km - lastFull.km;
    const litersUsed = (kmDriven * avgCons) / 100;
    return Math.max(8, Math.min(100, 100 - (litersUsed / vehicle.tank) * 100));
  }, [store.entries, vehicle, avgCons]);
  const tankRound = Math.round(tankPct);

  const yearEntries = store.entries.filter(e => {
    if (e.vehicleId !== vehicle?.id) return false;
    const d = parseISO(e.dateISO);
    return d && d.getFullYear() === now.getFullYear();
  });

  const upcoming = (store.events || [])
    .filter(e => e.vehicleId === vehicle?.id)
    .map(e => ({ ...e, days: daysUntil(e.endISO) }))
    .filter(e => e.days >= 0 && e.days <= 30)
    .sort((a, b) => a.days - b.days);

  if (!vehicle) return <div style={{ padding: 40, textAlign: 'center' }}>Önce araç ekleyin</div>;

  return (
    <div>
      <div className="app-header">
        <div className="brand-icon"><Icon.Fuel s={20}/></div>
        <div className="brand-name">Yakıt Defteri</div>
      </div>

      <div className="title-row">
        <div className="title-block">
          <h1>Özet</h1>
          <div className="sub">{store.vehicles.length} araç takip ediliyor</div>
        </div>
        <VehiclePill/>
      </div>

      <div className="hero">
        <div className="hero-label-row">
          <span className="eyebrow">Ortalama Tüketim</span>
          {consDelta !== null && (
            <span className="trend-pill">
              <span className="delta" style={{ color: consDelta <= 0 ? 'var(--positive)' : 'var(--negative)' }}>
                {consDelta <= 0 ? <Icon.TrendDown/> : <Icon.TrendUp/>}
                {consDelta > 0 ? '+' : ''}{fmt(consDelta, 1)}
              </span>
              son aya göre
            </span>
          )}
        </div>
        <div className="hero-big">
          {avgCons !== null ? fmt(avgCons, 2) : '—'}
          <span className="u">L/100km</span>
        </div>
        <div className="hero-sub">{consPts.length >= 2 ? `Tam depolar arası · ${consPts.length} ölçüm` : 'En az 2 tam depo gerekli'}</div>
        <div className="tank-row">
          <span className="label">Tahmini depo</span>
          <span className="value">
            <span>~{Math.round(vehicle.tank * tankPct / 100)} <span style={{ color: 'var(--text-2)', fontWeight: 400, fontSize: 11 }}>L</span></span>
            <span className="pct">·</span>
            <span>{tankRound}<span style={{ color: 'var(--text-2)', fontWeight: 400, fontSize: 11 }}>%</span></span>
          </span>
        </div>
      </div>

      <div className="stat-grid">
        <StatCard label="Bu ay harcama" value={fmt(thisMonthSpend, 2)} unit="₺" icon={<Icon.Coin/>} sub={`${thisMonth.length} dolum`}/>
        <StatCard label="km başına" value={tlPerKm !== null ? fmt(tlPerKm, 2) : '—'} unit="₺/km" icon={<Icon.Gauge/>} sub="son 30 gün"/>
        <StatCard label="Son dolum" value={last ? fmt(last.liters * last.pricePerL, 2) : '—'} unit="₺" icon={<Icon.Receipt/>} sub={last ? `${fmtDate(last.dateISO)} · ${fmt(last.liters, 0)} L` : '—'}/>
        <StatCard label="Toplam dolum" value={String(yearEntries.length)} unit="kayıt" icon={<Icon.Spark/>} sub={`${now.getFullYear()} yılı`}/>
      </div>

      {consPts.length >= 2 && (
        <>
          <div className="section-title">
            <h3>Tüketim Trendi</h3>
            <span className="meta">Son {consPts.length} dolum · L/100km</span>
          </div>
          <div className="chart-card">
            <AreaChart data={consPts.map(p => p.consumption)}/>
          </div>
        </>
      )}

      {upcoming.length > 0 && (
        <>
          <div className="section-title">
            <h3>Yaklaşan Hatırlatmalar</h3>
            <span className="meta">Sonraki 30 gün</span>
          </div>
          <div className="upcoming-list">
            {upcoming.map(e => (
              <div className="upcoming-row" key={e.id}>
                <div className="left">
                  <div className="iconbox">{e.type === 'Kasko' || e.type === 'Sigorta' ? <Icon.Shield/> : <Icon.Wrench/>}</div>
                  <div>
                    <div className="name">{e.type}</div>
                    <div className="date">{fmtDate(e.endISO)}</div>
                  </div>
                </div>
                <span className={`remaining ${e.days < 15 ? 'warn' : ''}`}>{e.days} gün</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ── Modals ──────────────────────────────────────────── */
function EntrySheet({ open, onClose, editing }) {
  const store = useStore();
  const isEdit = !!editing;
  const [vehicleId, setVehicleId] = useState(store.activeVehicleId);
  const [dateISO, setDateISO] = useState(todayISO());
  const [liters, setLiters] = useState('');
  const [pricePerL, setPricePerL] = useState('');
  const [km, setKm] = useState('');
  const [station, setStation] = useState('');
  const [full, setFull] = useState(true);

  useEffect(() => {
    if (!open) return;
    if (editing) {
      setVehicleId(editing.vehicleId);
      setDateISO(editing.dateISO);
      setLiters(fmt(editing.liters, 2));
      setPricePerL(fmt(editing.pricePerL, 2));
      setKm(String(editing.km || ''));
      setStation(editing.station || '');
      setFull(!!editing.full);
    } else {
      setVehicleId(store.activeVehicleId);
      setDateISO(todayISO());
      setLiters(''); setPricePerL(''); setKm(''); setStation(''); setFull(true);
    }
  }, [open, editing, store.activeVehicleId]);

  const total = useMemo(() => parseNum(liters) * parseNum(pricePerL), [liters, pricePerL]);
  if (!open) return null;

  const submit = () => {
    const l = parseNum(liters), p = parseNum(pricePerL);
    const k = parseInt(String(km).replace(/[^0-9]/g, ''), 10) || 0;
    if (!vehicleId || l <= 0 || p <= 0 || k <= 0) { alert('Eksik alan var.'); return; }
    const payload = { vehicleId, dateISO, liters: l, pricePerL: p, km: k, station: station.trim(), full };
    if (isEdit) store.updateEntry(editing.id, payload);
    else store.addEntry(payload);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-head">
          <h2>{isEdit ? 'Dolumu düzenle' : 'Yeni Dolum'}</h2>
          <button className="btn-icon" onClick={onClose}><Icon.X/></button>
        </div>
        <div className="modal-sub">{isEdit ? 'Bu kaydı düzenle' : 'Anlık dolumu ekle · ondalık için virgül'}</div>

        <div className="label">Araç</div>
        <select className="select" value={vehicleId} onChange={e => setVehicleId(e.target.value)}>
          {store.vehicles.map(v => <option key={v.id} value={v.id}>{v.name} · {v.plate}</option>)}
        </select>

        <div className="label" style={{ marginTop: 14 }}>Tarih</div>
        <input className="input mono" type="date" value={dateISO} onChange={e => setDateISO(e.target.value)}/>

        <div className="label" style={{ marginTop: 14 }}>Kilometre</div>
        <input className="input mono" inputMode="numeric" placeholder="örn. 146200" value={km} onChange={e => setKm(e.target.value.replace(/[^0-9]/g, ''))}/>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 14 }}>
          <div>
            <div className="label">Litre</div>
            <input className="input mono" inputMode="decimal" placeholder="0,00" value={liters} onChange={e => setLiters(e.target.value)}/>
          </div>
          <div>
            <div className="label">₺ / Litre</div>
            <input className="input mono" inputMode="decimal" placeholder="0,00" value={pricePerL} onChange={e => setPricePerL(e.target.value)}/>
          </div>
        </div>

        <div style={{ marginTop: 12, padding: '14px 16px', background: 'var(--bg-2)', border: '1px solid var(--border)', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span className="eyebrow">Toplam</span>
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 22, fontWeight: 500 }}>
            {fmt(total, 2)} <span style={{ color: 'var(--text-2)', fontSize: 13, fontWeight: 500 }}>₺</span>
          </span>
        </div>

        <div className={`toggle-card ${full ? 'on' : ''}`} style={{ marginTop: 12 }} onClick={() => setFull(v => !v)}>
          <div className="checkbox">{full && <Icon.Check s={12}/>}</div>
          <div>
            <h5>Tam depo</h5>
            <p>Tüketim hesabı bir sonraki tam depoyla yapılır.</p>
          </div>
        </div>

        <div className="label" style={{ marginTop: 14 }}>İstasyon (opsiyonel)</div>
        <input className="input" placeholder="Shell, BP, Opet…" value={station} onChange={e => setStation(e.target.value)}/>

        <button className="btn btn-primary" style={{ width: '100%', marginTop: 18 }} onClick={submit}>{isEdit ? 'Güncelle' : 'Kaydet'}</button>
      </div>
    </div>
  );
}

function VehicleSheet({ open, onClose, editing }) {
  const store = useStore();
  const isEdit = !!editing;

  const [plate, setPlate] = useState('');
  const [fuel, setFuel] = useState('Dizel');

    else store.addVehicle(payload);

  return (

function EventSheet({ open, onClose, editing }) {
  const store = useStore();
  const isEdit = !!editing;
  const [type, setType] = useState('Kasko');
  const [vehicleId, setVehicleId] = useState(store.activeVehicleId);
  const [startISO, setStartISO] = useState(todayISO());
  const [endISO, setEndISO] = useState('');
  const [notifyDays, setNotifyDays] = useState(15);

  useEffect(() => {
    if (!open) return;
    if (editing) {
      setType(editing.type || 'Kasko');
      setVehicleId(editing.vehicleId);
      setStartISO(editing.startISO || todayISO());
      setEndISO(editing.endISO || '');
      setNotifyDays(editing.notifyDays || 15);
    } else {
      setType('Kasko');
      setVehicleId(store.activeVehicleId);
      setStartISO(todayISO());
      const d = new Date(); d.setFullYear(d.getFullYear() + 1);
      setEndISO(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
      setNotifyDays(15);
    }
  }, [open, editing, store.activeVehicleId]);

  if (!open) return null;
  const submit = () => {
    if (!endISO) { alert('Bitiş tarihi gerekli.'); return; }
    const payload = { type, vehicleId, startISO, endISO, notifyDays };
    if (isEdit) store.updateEvent(editing.id, payload);
    else store.addEvent(payload);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-head"><h2>{isEdit ? 'Etkinliği düzenle' : 'Yeni etkinlik'}</h2><button className="btn-icon" onClick={onClose}><Icon.X/></button></div>
        <div className="label">Tür</div>
        <div className="chip-group">
          {['Kasko','Sigorta','Muayene','Bakım','Diğer'].map(t => (
            <button key={t} className={`chip-btn ${type === t ? 'active' : ''}`} onClick={() => setType(t)}>{t}</button>
          ))}
        </div>
        <div className="label" style={{ marginTop: 14 }}>Araç</div>
        <select className="select" value={vehicleId} onChange={e => setVehicleId(e.target.value)}>
          {store.vehicles.map(v => <option key={v.id} value={v.id}>{v.name} · {v.plate}</option>)}
        </select>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 12 }}>
          <div>
            <div className="label">Başlangıç</div>
            <input className="input mono" type="date" value={startISO} onChange={e => setStartISO(e.target.value)}/>
          </div>
          <div>
            <div className="label">Bitiş</div>
            <input className="input mono" type="date" value={endISO} onChange={e => setEndISO(e.target.value)}/>
          </div>
        </div>
        <div className="label" style={{ marginTop: 12 }}>Önceden bildir (gün)</div>
        <div className="chip-group">
          {[7, 15, 30, 60].map(d => (
            <button key={d} className={`chip-btn ${notifyDays === d ? 'active' : ''}`} onClick={() => setNotifyDays(d)}>{d}</button>
          ))}
        </div>
        <button className="btn btn-primary" style={{ width: '100%', marginTop: 18 }} onClick={submit}>{isEdit ? 'Güncelle' : 'Kaydet'}</button>
      </div>
    </div>
  );
}

            <span>9:41</span>
            <span className="ios-statusbar-icons">
              <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx="0.5"/><rect x="4.5" y="4" width="3" height="7" rx="0.5"/><rect x="9" y="2" width="3" height="9" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></svg>
              <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 1.5C5.5 1.5 3.1 2.4 1.3 4l1.2 1.2C4.1 3.7 6 3 8 3s3.9 0.7 5.5 2.2L14.7 4C12.9 2.4 10.5 1.5 8 1.5zM8 5.5c-1.5 0-2.9 0.6-3.9 1.6L5.3 8.3C6 7.6 7 7.2 8 7.2s2 0.4 2.7 1.1l1.2-1.2C10.9 6.1 9.5 5.5 8 5.5zM8 9.3l-1.8 1.8h3.6L8 9.3z"/></svg>
              <svg width="25" height="11" viewBox="0 0 25 11" fill="none"><rect x="0.5" y="0.5" width="21" height="10" rx="2.5" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="7" rx="1" fill="currentColor"/><rect x="22.5" y="3.5" width="1.5" height="4" rx="0.75" fill="currentColor" opacity="0.4"/></svg>
            </span>
          </div>
          <div className="app">
            <div className="app-content">
              {screen === 'ozet' && <OzetScreen/>}
              {screen === 'gecmis' && <GecmisScreen onEdit={e => setEntrySheet({ open: true, editing: e })}/>}
              {screen === 'takvim' && <TakvimScreen onAddEvent={() => setEventSheet({ open: true, editing: null })} onEditEvent={e => setEventSheet({ open: true, editing: e })}/>}
              {screen === 'ayarlar' && <AyarlarScreen theme={theme} setTheme={setTheme} onAddVehicle={() => setVehicleSheet({ open: true, editing: null })} onEditVehicle={v => setVehicleSheet({ open: true, editing: v })}/>}
            </div>
            <nav className="bottom-nav">
              <button className={`nav-btn ${screen === 'ozet' ? 'active' : ''}`} onClick={() => setScreen('ozet')}><Icon.Home/><span>Özet</span></button>
              <button className={`nav-btn ${screen === 'gecmis' ? 'active' : ''}`} onClick={() => setScreen('gecmis')}><Icon.History/><span>Geçmiş</span></button>
              <div className="fab-wrap"><button className="fab" onClick={() => setEntrySheet({ open: true, editing: null })}><Icon.Plus s={26}/></button></div>
              <button className={`nav-btn ${screen === 'takvim' ? 'active' : ''}`} onClick={() => setScreen('takvim')}><Icon.Calendar/><span>Takvim</span></button>
              <button className={`nav-btn ${screen === 'ayarlar' ? 'active' : ''}`} onClick={() => setScreen('ayarlar')}><Icon.Settings/><span>Ayarlar</span></button>
            </nav>
            <div className="ios-home-indicator"/>
          </div>
          <EntrySheet open={entrySheet.open} editing={entrySheet.editing} onClose={() => setEntrySheet({ open: false, editing: null })}/>
          <VehicleSheet open={vehicleSheet.open} editing={vehicleSheet.editing} onClose={() => setVehicleSheet({ open: false, editing: null })}/>
          <EventSheet open={eventSheet.open} editing={eventSheet.editing} onClose={() => setEventSheet({ open: false, editing: null })}/>
        </div>
      </div>
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
